services:
   frontend:
      image: oven/bun:1.3
      working_dir: /workspace
      command: sh -c "bun install"
      ports:
         - "3000:3000"
      environment:
         VITE_DEV_API_TARGET: http://api
         VITE_DEV_API_BASE_PATH: /api
         CHOKIDAR_USEPOLLING: "true"
      volumes:
         - ./:/workspace
      depends_on:
         - api

   api:
      build:
         context: .
         dockerfile: Dockerfile
      ports:
         - "8080:80"
      environment:
         DB_HOST: db
         DB_PORT: 3306
         DB_NAME: activitree
         DB_USER: root
         DB_PASS: root
      volumes:
         - ./:/var/www/html
      depends_on:
         - db

   db:
      image: mysql:8.1
      ports:
         - "3307:3306"
      environment:
         MYSQL_ROOT_PASSWORD: root
         MYSQL_DATABASE: activitree
      volumes:
         - activitree-db-data:/var/lib/mysql
         - ./documentation/db.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
   activitree-db-data:
